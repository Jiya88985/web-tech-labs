<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>
    <h1>Student Registration Form</h1>
    
    <form method="POST" action="/submit-registration">
        <!-- Full Name -->
        <fieldset>
            <legend>Personal Information</legend>
            
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>
            <br><br>
            
            <!-- Registration Number -->
            <label for="regnum">Registration Number:</label>
            <input type="text" id="regnum" name="regnum" placeholder="e.g., 2024-XXX-XXX" required>
            <br><br>
            
            <!-- Email -->
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>
            <br><br>
            
            <!-- Password -->
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <br><br>
        </fieldset>
        
        <!-- Course Selection -->
        <fieldset>
            <legend>Course Selection</legend>
            
            <label for="course">Select Course:</label>
            <select id="course" name="course" required>
                <option value="">-- Choose a Course --</option>
                <option value="web-tech">Web Technologies</option>
                <option value="os">Operating Systems</option>
                <option value="dbms">Database Management Systems</option>
                <option value="data-structures">Data Structures</option>
                <option value="algorithms">Algorithms</option>
            </select>
            <br><br>
        </fieldset>
        
        <!-- Semester Selection -->
        <fieldset>
            <legend>Semester</legend>
            
            <label>
                <input type="radio" name="semester" value="semester-1" required>
                Semester 1
            </label>
            <br>
            
            <label>
                <input type="radio" name="semester" value="semester-2" required>
                Semester 2
            </label>
            <br>
            
            <label>
                <input type="radio" name="semester" value="semester-3" required>
                Semester 3
            </label>
            <br>
            
            <label>
                <input type="radio" name="semester" value="semester-4" required>
                Semester 4
            </label>
            <br><br>
        </fieldset>
        
        <!-- Terms and Conditions -->
        <fieldset>
            <legend>Agreement</legend>
            
            <label>
                <input type="checkbox" name="terms" value="agree" required>
                I agree to the Terms and Conditions
            </label>
            <br>
            
            <label>
                <input type="checkbox" name="privacy" value="agree">
                I agree to the Privacy Policy
            </label>
            <br><br>
        </fieldset>
        
        <!-- Submit Button -->
        <button type="submit">Submit Registration</button>
        <button type="reset">Clear Form</button>
    </form>
</body>
</html>
